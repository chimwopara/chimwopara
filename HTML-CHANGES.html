<script>
// Simplified checkSelections - just checks if there's text input
function checkSelections() {
    const question = document.getElementById('questionInput')?.value?.trim();
    const generateBtn = document.getElementById('generateBtn');

<!--
==============================================
GOOGLE SIGN-IN FIX
==============================================

The Google sign-in button in the sidebar (#customGoogleSignInBtn) should work,
but there may be timing issues. Add this to ensure it initializes properly:
-->

<script>
// Ensure Google sign-in is ready
let tokenClientReady = false;

function initGoogleSignIn() {
    if (typeof google === 'undefined' || !google.accounts) {
        console.log('Google API not loaded yet, retrying...');
        setTimeout(initGoogleSignIn, 500);
        return;
    }
    
    try {
        window.tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: "9571013902-q69a5hulb67vquu8ud41qmr3l135pdbj.apps.googleusercontent.com",
            scope: 'email profile openid',
            callback: handleTokenResponse,
            error_callback: (error) => {
                console.error("Google Sign-In Error:", error);
                showAlert("Sign-in failed. Please try again.", true);
            }
        });
        
        tokenClientReady = true;
        console.log('Google Sign-In initialized successfully');
        
        // Attach click handler to sidebar button
        const sidebarBtn = document.getElementById('customGoogleSignInBtn');
        if (sidebarBtn) {
            sidebarBtn.onclick = (e) => {
                e.preventDefault();
                if (tokenClientReady && window.tokenClient) {
                    window.tokenClient.requestAccessToken();
                } else {
                    showAlert('Google Sign-In is loading...', true, 2000);
                }
            };
        }
        
    } catch (error) {
        console.error("Error initializing Google Token Client:", error);
    }
}

// Start initialization when DOM is ready
document.addEventListener('DOMContentLoaded', initGoogleSignIn);
// Also try on window load as backup
window.addEventListener('load', () => {
    if (!tokenClientReady) initGoogleSignIn();
});
</script>
